<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html list</title>
</head>

<body>
    <ul type="square"> <!-- type of list = circle , square , disc -->
        <li>home</li>
        <li>about</li>
        <li>service</li>
        <li>hemant</li>
    </ul>

    <ol type="i"> <!-- type of list = 1,i,I,A,a -->
        <li>home</li>
        <li>about</li>
        <li>service</li>
        <li>hemant</li>
    </ol>
</body>

</html>
